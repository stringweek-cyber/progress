<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>진도 체크</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        textarea::placeholder { opacity: 1; }
        thead th { position: sticky; top: 0; z-index: 10; background-color: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 안정적인 아이콘 렌더링을 위한 인라인 SVG 컴포넌트
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                'check-circle-2': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
                'menu': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
                'rotate-ccw': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
                'arrow-left': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
                'trash-2': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
                'plus': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
                'message-square': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const DAYS_MAP = ['월', '화', '수', '목', '금'];

            const savedClasses = JSON.parse(localStorage.getItem('classes')) || [
                { id: 1, name: '6반', days: [true, false, true, false, false] },
                { id: 2, name: '7반', days: [false, true, false, true, false] },
                { id: 3, name: '8반', days: [true, false, false, false, true] },
                { id: 4, name: '9반', days: [false, false, true, false, false] },
            ];
            
            const savedLessons = JSON.parse(localStorage.getItem('lessons')) || [
                { id: 1, name: '변성암', data: Array(10).fill(null).map(() => ({ checked: false, note: '' })) },
                { id: 2, name: '암석의 순환', data: Array(10).fill(null).map(() => ({ checked: false, note: '' })) },
                { id: 3, name: '풍화와 토양', data: Array(10).fill(null).map(() => ({ checked: false, note: '' })) },
                { id: 4, name: '움직이는 대륙', data: Array(10).fill(null).map(() => ({ checked: false, note: '' })) },
                { id: 5, name: '판', data: Array(10).fill(null).map(() => ({ checked: false, note: '' })) },
            ];

            const [classes, setClasses] = useState(savedClasses);
            const [lessons, setLessons] = useState(savedLessons);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [showCompleted, setShowCompleted] = useState(false);

            useEffect(() => {
                localStorage.setItem('classes', JSON.stringify(classes));
                localStorage.setItem('lessons', JSON.stringify(lessons));
            }, [classes, lessons]);

            const toggleCheck = (lIdx, cIdx) => {
                const updated = [...lessons];
                updated[lIdx].data[cIdx].checked = !updated[lIdx].data[cIdx].checked;
                setLessons(updated);
            };

            const updateNote = (lIdx, cIdx, text) => {
                const updated = [...lessons];
                updated[lIdx].data[cIdx].note = text;
                setLessons(updated);
            };

            const updateLessonName = (idx, newName) => {
                const updated = [...lessons];
                updated[idx].name = newName;
                setLessons(updated);
            };

            const addLesson = () => {
                const newId = lessons.length > 0 ? Math.max(...lessons.map(l => l.id)) + 1 : 1;
                setLessons([...lessons, {
                    id: newId, name: `새 차시 ${newId}`,
                    data: Array(20).fill(null).map(() => ({ checked: false, note: '' }))
                }]);
            };

            const removeLesson = (id) => setLessons(lessons.filter(l => l.id !== id));

            const isAllChecked = (idx) => lessons[idx].data.slice(0, classes.length).every(d => d.checked);
            
            const shouldShowRow = (idx) => {
                if (showCompleted) return true;
                if (!isAllChecked(idx)) return true;
                if (idx < lessons.length - 1 && !isAllChecked(idx + 1)) return true;
                return false;
            };

            const getPlaceholder = (lIdx, cIdx) => {
                const classInfo = classes[cIdx];
                if (!classInfo || !classInfo.days.some(d => d)) return "";
                const firstUncheckedIdx = lessons.findIndex(l => !l.data[cIdx]?.checked);
                if (!lessons[lIdx].data[cIdx]?.checked && lIdx >= firstUncheckedIdx && lIdx < firstUncheckedIdx + 4) {
                    const activeDays = classInfo.days.map((d, i) => d ? DAYS_MAP[i] : null).filter(Boolean);
                    return `${activeDays[lIdx % activeDays.length]}`;
                }
                return "";
            };

            if (isSettingsOpen) {
                return (
                    <div className="min-h-screen bg-white p-4 animate-in slide-in-from-right duration-300 font-sans">
                        <div className="max-w-md mx-auto space-y-6">
                            <div className="flex items-center justify-between border-b pb-4">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setIsSettingsOpen(false)} className="p-2"><Icon name="arrow-left" /></button>
                                    <h2 className="text-xl font-bold">설정</h2>
                                </div>
                                <button onClick={() => {
                                    const newId = Date.now();
                                    setClasses([...classes, { id: newId, name: `${classes.length + 1}반`, days: [false, false, false, false, false] }]);
                                }} className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-lg tracking-tighter">학급 추가</button>
                            </div>
                            <div className="space-y-3">
                                {classes.map((c) => (
                                    <div key={c.id} className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex flex-col gap-3">
                                        <div className="flex items-center justify-between">
                                            <input type="text" value={c.name} onChange={(e) => setClasses(classes.map(cl => cl.id === c.id ? { ...cl, name: e.target.value } : cl))} className="bg-transparent font-bold text-base outline-none w-24 border-b border-blue-200 text-center" />
                                            <button onClick={() => setClasses(classes.filter(cl => cl.id !== c.id))} className="text-slate-300"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                        <div className="flex gap-1 justify-between">
                                            {DAYS_MAP.map((day, dIdx) => (
                                                <button key={day} onClick={() => setClasses(classes.map(cl => {
                                                    if (cl.id === c.id) {
                                                        const n = [...cl.days]; n[dIdx] = !n[dIdx]; return { ...cl, days: n };
                                                    } return cl;
                                                }))} className={`flex-1 h-9 rounded-lg text-xs font-bold border ${c.days[dIdx] ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-200 text-slate-400'}`}>{day}</button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setIsSettingsOpen(false)} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">설정 저장</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans flex flex-col">
                    <header className="sticky top-0 z-30 bg-white p-4 shadow-sm border-b flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-600 rounded-lg shadow-blue-200 shadow-lg flex items-center justify-center">
                                <Icon name="check-circle-2" className="text-white" size={24} />
                            </div>
                            <h1 className="text-lg font-bold tracking-tight">진도 체크</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setShowCompleted(!showCompleted)} className={`p-2 rounded-lg border ${showCompleted ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white text-slate-600'}`}><Icon name="rotate-ccw" size={18} /></button>
                            <button onClick={() => setIsSettingsOpen(true)} className="p-2 bg-white border border-slate-200 rounded-lg text-slate-600 flex items-center justify-center transition-colors active:bg-slate-100">
                                <Icon name="menu" size={20} />
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 overflow-auto no-scrollbar relative">
                        <table className="w-full border-collapse table-fixed min-w-[600px]">
                            <thead className="sticky top-0 z-20 shadow-sm">
                                <tr className="bg-slate-100 border-b border-slate-200 text-[10px] font-black text-slate-500 uppercase">
                                    <th className="p-2 w-10 text-center border-r">No</th>
                                    <th className="p-2 w-32 text-left border-r px-3">차시명</th>
                                    {classes.map(c => (
                                        <th key={c.id} className="p-2 text-center border-r last:border-r-0 bg-blue-50 text-blue-700 font-black text-xs">{c.name}</th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {lessons.map((lesson, lIdx) => {
                                    if (!shouldShowRow(lIdx)) return null;
                                    const allDone = isAllChecked(lIdx);
                                    return (
                                        <tr key={lesson.id} className={`${allDone ? 'bg-slate-50 grayscale opacity-40' : 'bg-white hover:bg-slate-50/50'}`}>
                                            <td className="p-2 text-center text-slate-900 font-bold text-xs border-r">{lesson.id}</td>
                                            <td className="p-1 border-r group">
                                                <div className="flex items-center px-1">
                                                    <input type="text" value={lesson.name} onChange={(e) => updateLessonName(lIdx, e.target.value)} className="w-full bg-transparent p-1 text-xs font-bold outline-none border border-transparent focus:border-blue-200 rounded text-center" />
                                                    <button onClick={() => removeLesson(lesson.id)} className="opacity-0 group-hover:opacity-100 p-1 text-slate-300"><Icon name="trash-2" size={12} /></button>
                                                </div>
                                            </td>
                                            {classes.map((_, cIdx) => (
                                                <td key={cIdx} className="p-1 border-r last:border-r-0 align-top">
                                                    <div className={`flex flex-col gap-1 p-0.5 rounded-lg border ${lesson.data[cIdx]?.checked ? 'border-yellow-400 bg-yellow-50/50' : 'border-slate-50'}`}>
                                                        <button onClick={() => toggleCheck(lIdx, cIdx)} className={`h-8 w-full rounded-md text-[10px] font-black transition-all ${lesson.data[cIdx]?.checked ? 'bg-yellow-400 text-yellow-900 shadow-sm' : 'bg-white border text-slate-300'}`}>
                                                            완료
                                                        </button>
                                                        <div className="relative">
                                                            <Icon name="message-square" size={8} className={`absolute top-1.5 left-1 ${lesson.data[cIdx]?.note ? 'text-blue-500' : 'text-slate-300'}`} />
                                                            <textarea 
                                                                value={lesson.data[cIdx]?.note || ''} 
                                                                onChange={(e) => updateNote(lIdx, cIdx, e.target.value)}
                                                                className="w-full h-10 p-1 pl-4 bg-white/50 border border-slate-100 rounded text-[10px] outline-none resize-none leading-tight placeholder:text-slate-500 placeholder:font-bold placeholder:text-xs text-center font-bold"
                                                                placeholder={getPlaceholder(lIdx, cIdx)}
                                                            />
                                                        </div>
                                                    </div>
                                                </td>
                                            ))}
                                        </tr>
                                    );
                                })}
                                <tr>
                                    <td colSpan={2 + classes.length} className="p-4">
                                        <button onClick={addLesson} className="w-full py-3 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center gap-2 text-slate-400 font-bold text-sm bg-white active:scale-95 transition-transform">
                                            <Icon name="plus" size={16} /> 새로운 차시 추가
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
