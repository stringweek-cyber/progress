<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>진도 체크</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        textarea::placeholder { opacity: 1; color: #64748b; font-weight: 900; }
        thead th { position: sticky; top: 0; z-index: 20; background-color: #f1f5f9; }
        .sticky-col { position: sticky; left: 0; z-index: 10; background-color: white; border-right: 1px solid #e2e8f0; }
        thead th.sticky-col { z-index: 30; background-color: #f1f5f9; }
        .section-header th { position: sticky; top: 33px; z-index: 25; }
        .lesson-hidden td { opacity: 0.45; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                'check-circle-2': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>,
                'menu': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
                'rotate-ccw': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
                'arrow-left': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
                'trash-2': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
                'plus': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
                'message-square': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
                'layout-list': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><path d="M14 4h7"/><path d="M14 9h7"/><path d="M14 15h7"/><path d="M14 20h7"/></svg>,
                'eye': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
                'eye-off': <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>,
            };
            return icons[name] || null;
        };

        const DAYS_MAP = ['월', '화', '수', '목', '금'];

        const defaultClasses = [
            { id: 1, name: '6반', days: [true, false, true, false, false] },
            { id: 2, name: '7반', days: [false, true, false, true, false] },
            { id: 3, name: '8반', days: [true, false, false, false, true] },
            { id: 4, name: '9반', days: [false, false, true, false, false] },
        ];

        const makeEmptyLessons = (classCount) => [
            { id: 1, name: '차시 1', hidden: false, data: Array(classCount).fill(null).map(() => ({ checked: false, note: '', completedAt: null })) },
            { id: 2, name: '차시 2', hidden: false, data: Array(classCount).fill(null).map(() => ({ checked: false, note: '', completedAt: null })) },
            { id: 3, name: '차시 3', hidden: false, data: Array(classCount).fill(null).map(() => ({ checked: false, note: '', completedAt: null })) },
        ];

        const defaultSections = [
            {
                id: 1,
                title: '진도표 1',
                showCompleted: false,
                lessons: [
                    { id: 1, name: '변성암',      hidden: false, data: Array(4).fill(null).map(() => ({ checked: false, note: '', completedAt: null })) },
                    { id: 2, name: '암석의 순환',  hidden: false, data: Array(4).fill(null).map(() => ({ checked: false, note: '', completedAt: null })) },
                    { id: 3, name: '풍화와 토양',  hidden: false, data: Array(4).fill(null).map(() => ({ checked: false, note: '', completedAt: null })) },
                    { id: 4, name: '움직이는 대륙',hidden: false, data: Array(4).fill(null).map(() => ({ checked: false, note: '', completedAt: null })) },
                    { id: 5, name: '판',           hidden: false, data: Array(4).fill(null).map(() => ({ checked: false, note: '', completedAt: null })) },
                ],
            },
        ];

        const syncLessonsToClasses = (lessons, classCount) =>
            lessons.map(l => {
                const data = [...l.data];
                while (data.length < classCount) data.push({ checked: false, note: '', completedAt: null });
                return { ...l, data: data.slice(0, classCount) };
            });

        const LessonTable = ({ section, classes, onUpdate, onRemoveSection, isFirst }) => {
            const { lessons, showCompleted } = section;
            const [showHiddenPanel, setShowHiddenPanel] = React.useState(false);

            const updateLesson = (updater) => {
                onUpdate({ ...section, lessons: updater(lessons) });
            };

            const toggleCheck = (lIdx, cIdx) => {
                updateLesson(prev => prev.map((l, li) => li === lIdx ? {
                    ...l, data: l.data.map((d, ci) => ci === cIdx
                        ? { ...d, checked: !d.checked, completedAt: !d.checked ? Date.now() : null }
                        : d)
                } : l));
            };

            const updateNote = (lIdx, cIdx, text) => {
                updateLesson(prev => prev.map((l, li) => li === lIdx ? {
                    ...l, data: l.data.map((d, ci) => ci === cIdx ? { ...d, note: text } : d)
                } : l));
            };

            const updateLessonName = (idx, newName) => {
                updateLesson(prev => prev.map((l, li) => li === idx ? { ...l, name: newName } : l));
            };

            // ✅ 차시 개별 숨김 토글
            const toggleLessonHidden = (lIdx) => {
                updateLesson(prev => prev.map((l, li) => li === lIdx ? { ...l, hidden: !l.hidden } : l));
            };

            const addLesson = () => {
                updateLesson(prev => {
                    const newId = prev.length > 0 ? Math.max(...prev.map(l => l.id)) + 1 : 1;
                    return [...prev, {
                        id: newId, name: `차시 ${newId}`, hidden: false,
                        data: Array(classes.length).fill(null).map(() => ({ checked: false, note: '', completedAt: null }))
                    }];
                });
            };

            const removeLesson = (id) => updateLesson(prev => prev.filter(l => l.id !== id));

            const isAllChecked = (idx) => lessons[idx].data.slice(0, classes.length).every(d => d.checked);

            const shouldShowRow = (idx) => {
                if (showCompleted) return true;
                return !isAllChecked(idx);
            };

            const completedCount = lessons.filter((_, idx) => isAllChecked(idx)).length;
            // ✅ 숨겨진 차시 개수 (완료 자동숨김과 별개)
            const hiddenCount = lessons.filter(l => l.hidden).length;

            const getPlaceholder = (lIdx, cIdx) => {
                const classInfo = classes[cIdx];
                if (!classInfo || !classInfo.days.some(d => d)) return "";
                const firstUncheckedIdx = lessons.findIndex(l => !l.data[cIdx]?.checked);
                if (lIdx < firstUncheckedIdx || lIdx >= firstUncheckedIdx + 4) return "";
                if (lessons[lIdx].data[cIdx]?.checked) return "";
                let baseDate = new Date();
                const completedTimes = lessons.map(l => l.data[cIdx]?.completedAt).filter(t => t !== null);
                if (completedTimes.length > 0) baseDate = new Date(Math.max(...completedTimes));
                const getNextSessionDay = (base, offset) => {
                    let date = new Date(base);
                    let count = 0;
                    while (count <= offset) {
                        date.setDate(date.getDate() + 1);
                        let dayIdx = date.getDay();
                        let mapIdx = dayIdx === 0 ? 6 : dayIdx - 1;
                        if (mapIdx < 5 && classInfo.days[mapIdx]) count++;
                    }
                    return DAYS_MAP[date.getDay() === 0 ? 6 : date.getDay() - 1];
                };
                return getNextSessionDay(baseDate, lIdx - firstUncheckedIdx);
            };

            const toggleShowCompleted = () => onUpdate({ ...section, showCompleted: !showCompleted });

            return (
                <div className="mb-0">
                    <table className="w-full border-collapse table-fixed min-w-full">
                        <thead>
                            <tr className={`border-b text-[10px] font-black uppercase ${isFirst ? 'bg-slate-100 border-slate-200 text-slate-500' : 'bg-red-50 border-red-200 text-red-400'}`}>
                                <th className={`p-2 w-28 text-left sticky-col border-r ${isFirst ? '' : 'bg-red-50'}`}>
                                    <div className="flex items-center gap-1">
                                        <span>차시명</span>
                                        <button
                                            onClick={toggleShowCompleted}
                                            className={`ml-auto flex items-center gap-0.5 px-1.5 py-1 rounded border transition-colors ${
                                                showCompleted
                                                    ? (isFirst ? 'bg-blue-600 border-blue-600 text-white' : 'bg-red-500 border-red-500 text-white')
                                                    : completedCount > 0
                                                        ? (isFirst ? 'bg-blue-50 border-blue-300 text-blue-600' : 'bg-red-50 border-red-300 text-red-500')
                                                        : 'bg-white text-slate-300 border-slate-200'
                                            }`}
                                            title={showCompleted ? '완료 차시 숨기기' : '완료 차시 보기'}
                                        >
                                            <Icon name={showCompleted ? 'eye' : 'eye-off'} size={10} />
                                            {completedCount > 0 && (
                                                <span className="text-[9px] font-black leading-none">{completedCount}</span>
                                            )}
                                        </button>
                                        {/* ✅ 숨겨진 차시 복원 배지 */}
                                        {hiddenCount > 0 && (
                                            <div className="relative">
                                                <button
                                                    onClick={() => setShowHiddenPanel(v => !v)}
                                                    className="flex items-center gap-0.5 px-1.5 py-1 rounded border bg-slate-100 border-slate-300 text-slate-500"
                                                    title="숨긴 차시 관리"
                                                >
                                                    <Icon name="eye-off" size={10} />
                                                    <span className="text-[9px] font-black leading-none">{hiddenCount}</span>
                                                </button>
                                                {showHiddenPanel && (
                                                    <div className="absolute left-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg z-50 min-w-[120px] p-1.5 flex flex-col gap-1">
                                                        {lessons.map((l, lIdx) => l.hidden && (
                                                            <button
                                                                key={l.id}
                                                                onClick={() => { toggleLessonHidden(lIdx); }}
                                                                className="flex items-center gap-1.5 px-2 py-1.5 rounded-lg hover:bg-slate-50 text-left"
                                                            >
                                                                <Icon name="eye" size={12} className="text-blue-500 flex-shrink-0" />
                                                                <span className="text-[11px] font-bold text-slate-700">{l.name}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                        <button onClick={onRemoveSection} className="p-1 rounded border border-slate-200 bg-white text-slate-300"><Icon name="trash-2" size={10} /></button>
                                    </div>
                                </th>
                                {classes.map(c => (
                                    <th key={c.id} className={`p-2 text-center border-r last:border-r-0 font-black text-xs min-w-[80px] ${isFirst ? 'bg-blue-50 text-blue-700' : 'bg-red-100 text-red-600'}`}>{c.name}</th>
                                ))}
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {lessons.map((lesson, lIdx) => {
                                if (!shouldShowRow(lIdx)) return null;
                                // ✅ 숨겨진 차시는 완전히 숨김
                                if (lesson.hidden) return null;

                                return (
                                    <tr key={lesson.id} className="bg-white">
                                        <td className="p-1 border-r sticky-col group">
                                            <div className="flex items-center px-0.5 gap-1">
                                                <input
                                                    type="text"
                                                    value={lesson.name}
                                                    onChange={(e) => updateLessonName(lIdx, e.target.value)}
                                                    className="flex-1 min-w-0 bg-transparent p-1 text-[13px] font-bold outline-none border border-transparent focus:border-blue-200 rounded text-center"
                                                />
                                                {/* ✅ 차시별 숨김 버튼 - 항상 표시 */}
                                                <button
                                                    onClick={() => toggleLessonHidden(lIdx)}
                                                    className="flex-shrink-0 p-1 rounded border border-slate-200 bg-white text-slate-300 hover:text-slate-500 hover:border-slate-300 transition-colors"
                                                    title="이 차시 숨기기"
                                                >
                                                    <Icon name="eye-off" size={10} />
                                                </button>
                                                <button onClick={() => removeLesson(lesson.id)} className="opacity-0 group-hover:opacity-100 flex-shrink-0 p-1 text-slate-300"><Icon name="trash-2" size={10} /></button>
                                            </div>
                                        </td>
                                        {classes.map((_, cIdx) => (
                                            <td key={cIdx} className="p-1 border-r last:border-r-0 align-top">
                                                <div className={`flex flex-col gap-1 p-0.5 rounded-lg border ${lesson.data[cIdx]?.checked ? 'border-yellow-400 bg-yellow-50/50' : 'border-slate-50'}`}>
                                                    <button onClick={() => toggleCheck(lIdx, cIdx)} className={`h-8 w-full rounded-md text-[10px] font-black transition-all ${lesson.data[cIdx]?.checked ? 'bg-yellow-400 text-yellow-900 shadow-sm' : 'bg-white border text-slate-300'}`}>
                                                        완료
                                                    </button>
                                                    <div className="relative">
                                                        <Icon name="message-square" size={8} className={`absolute top-1.5 left-1 ${lesson.data[cIdx]?.note ? 'text-blue-500' : 'text-slate-300'}`} />
                                                        <textarea
                                                            value={lesson.data[cIdx]?.note || ''}
                                                            onChange={(e) => updateNote(lIdx, cIdx, e.target.value)}
                                                            className="w-full h-10 p-1 pl-4 bg-white/50 border border-slate-100 rounded text-[10px] outline-none resize-none leading-tight text-center font-bold"
                                                            placeholder={getPlaceholder(lIdx, cIdx)}
                                                        />
                                                    </div>
                                                </div>
                                            </td>
                                        ))}
                                    </tr>
                                );
                            })}
                            <tr>
                                <td colSpan={1 + classes.length} className="p-3">
                                    <button onClick={addLesson} className="w-full py-2.5 border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center gap-2 text-slate-400 font-bold text-sm bg-white active:scale-95 transition-transform">
                                        <Icon name="plus" size={14} /> 새로운 차시 추가
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            );
        };

        const App = () => {
            const load = (key, def) => {
                try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
            };

            const [classes, setClasses] = useState(() => load('classes', defaultClasses));
            const [sections, setSections] = useState(() => load('sections', defaultSections));
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);

            useEffect(() => {
                localStorage.setItem('classes', JSON.stringify(classes));
            }, [classes]);

            useEffect(() => {
                localStorage.setItem('sections', JSON.stringify(sections));
            }, [sections]);

            const updateClasses = (newClasses) => {
                setClasses(newClasses);
                setSections(prev => prev.map(sec => ({
                    ...sec,
                    lessons: syncLessonsToClasses(sec.lessons, newClasses.length)
                })));
            };

            const updateSection = (id, updated) => {
                setSections(prev => prev.map(s => s.id === id ? updated : s));
            };

            const removeSection = (id) => {
                setSections(prev => prev.filter(s => s.id !== id));
            };

            const addSection = () => {
                const newId = sections.length > 0 ? Math.max(...sections.map(s => s.id)) + 1 : 1;
                setSections(prev => [...prev, {
                    id: newId,
                    title: `진도표 ${newId}`,
                    showCompleted: false,
                    lessons: makeEmptyLessons(classes.length),
                }]);
            };

            if (isSettingsOpen) {
                return (
                    <div className="h-screen bg-white p-4 font-sans overflow-auto">
                        <div className="max-w-md mx-auto space-y-6">
                            <div className="flex items-center justify-between border-b pb-4">
                                <div className="flex items-center gap-3">
                                    <button onClick={() => setIsSettingsOpen(false)} className="p-2"><Icon name="arrow-left" /></button>
                                    <h2 className="text-xl font-bold">설정</h2>
                                </div>
                                <button onClick={() => {
                                    const newId = Date.now();
                                    updateClasses([...classes, { id: newId, name: `${classes.length + 1}반`, days: [false, false, false, false, false] }]);
                                }} className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-lg tracking-tighter">학급 추가</button>
                            </div>
                            <div className="space-y-3">
                                {classes.map((c) => (
                                    <div key={c.id} className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex flex-col gap-3">
                                        <div className="flex items-center justify-between">
                                            <input type="text" value={c.name} onChange={(e) => updateClasses(classes.map(cl => cl.id === c.id ? { ...cl, name: e.target.value } : cl))} className="bg-transparent font-bold text-base outline-none w-24 border-b border-blue-200 text-center" />
                                            <button onClick={() => updateClasses(classes.filter(cl => cl.id !== c.id))} className="text-slate-300"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                        <div className="flex gap-1 justify-between">
                                            {DAYS_MAP.map((day, dIdx) => (
                                                <button key={day} onClick={() => updateClasses(classes.map(cl => {
                                                    if (cl.id === c.id) {
                                                        const n = [...cl.days]; n[dIdx] = !n[dIdx]; return { ...cl, days: n };
                                                    } return cl;
                                                }))} className={`flex-1 h-9 rounded-lg text-xs font-bold border ${c.days[dIdx] ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-200 text-slate-400'}`}>{day}</button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setIsSettingsOpen(false)} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">설정 저장</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen bg-slate-50 font-sans flex flex-col">
                    <header className="flex-none bg-white p-4 shadow-sm border-b flex items-center justify-between z-40">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-600 rounded-lg shadow-blue-200 shadow-lg flex items-center justify-center">
                                <Icon name="check-circle-2" className="text-white" size={24} />
                            </div>
                            <h1 className="text-lg font-bold tracking-tight">진도 체크</h1>
                        </div>
                        <button onClick={() => setIsSettingsOpen(true)} className="p-2 bg-white border border-slate-200 rounded-lg text-slate-600 flex items-center justify-center transition-colors active:bg-slate-100">
                            <Icon name="menu" size={20} />
                        </button>
                    </header>

                    <div className="flex-1 overflow-auto no-scrollbar">
                        {sections.map((section, sIdx) => (
                            <LessonTable
                                key={section.id}
                                section={section}
                                classes={classes}
                                onUpdate={(updated) => updateSection(section.id, updated)}
                                onRemoveSection={() => removeSection(section.id)}
                                isFirst={sIdx === 0}
                            />
                        ))}

                        <div className="p-4">
                            <button
                                onClick={addSection}
                                className="w-full py-4 border-2 border-dashed border-blue-200 rounded-2xl flex items-center justify-center gap-2 text-blue-400 font-bold text-sm bg-blue-50/50 active:scale-95 transition-transform"
                            >
                                <Icon name="plus" size={16} />
                                새로운 진도표 추가
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
